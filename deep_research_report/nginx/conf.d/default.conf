# Agent Forge — Site Configuration
# Fixes SPA fallback issue: /api/* routes are proxied BEFORE try_files fallback

upstream backend {
    # least_conn — best for SSE long connections
    least_conn;
    server backend:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name baiyemeng.top;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name baiyemeng.top;

    # ── SSL ──
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──
    add_header X-Frame-Options             "SAMEORIGIN" always;
    add_header X-Content-Type-Options      "nosniff"    always;
    add_header X-XSS-Protection            "1; mode=block" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;

    # ── Logging ──
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log;

    # ═══════════════════════════════════════════════
    # CRITICAL: API routes MUST be before static files
    # This fixes the diagnostic report issues #3 and #4
    # ═══════════════════════════════════════════════

    # Health check — no rate limiting
    location = /api/v1/health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 5s;
    }

    # Decompose — strictest rate limiting (LLM call)
    location = /api/v1/decompose {
        limit_req zone=decompose burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
    }

    # Generate stream — long timeout for SSE
    location = /api/v1/generate/stream {
        limit_req zone=generate burst=1 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE critical settings
        proxy_set_header Connection        "";
        proxy_buffering                    off;
        proxy_cache                        off;
        chunked_transfer_encoding          on;

        proxy_read_timeout 300s;   # 5 min for long reports
        proxy_send_timeout 300s;
    }

    # Follow-up stream — long timeout for SSE
    location = /api/v1/follow-up/stream {
        limit_req zone=generate burst=2 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering                    off;
        proxy_cache                        off;
        chunked_transfer_encoding          on;
        proxy_read_timeout 120s;
    }

    # Search stream — SSE
    location = /api/v1/search/stream {
        limit_req zone=api burst=5 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering                    off;
        proxy_cache                        off;
        chunked_transfer_encoding          on;
        proxy_read_timeout 60s;
    }

    # General API fallback
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
    }

    # ═══════════════════════════════════════════════
    # Static assets — long cache
    # ═══════════════════════════════════════════════
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
    }

    location = /favicon.svg {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ═══════════════════════════════════════════════
    # SPA fallback — MUST be the LAST location block
    # ═══════════════════════════════════════════════
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        # index.html: never cache (SPA entry point)
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
    }
}
